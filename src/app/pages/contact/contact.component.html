<!-- Contact Section -->
<section class="ag-section ag-section-alt" style="position:relative;overflow:hidden;">
  <div class="ag-blob" style="width:380px;height:380px;bottom:-60px;right:-80px;background:rgba(0,196,167,0.06);animation-duration:22s;"></div>

  <div style="max-width:760px;margin:0 auto;padding:0 40px;position:relative;z-index:1;">

    <!-- Header -->
    <div style="text-align:center;margin-bottom:56px;" class="ag-fade-up">
      <div class="ag-badge" style="margin-bottom:20px;display:inline-flex;"><span class="dot"></span>Contact Us</div>
      <h2 style="font-size:clamp(2rem,4vw,3rem);margin-bottom:16px;">
        Ready to <span class="text-gradient">launch?</span>
      </h2>
      <p style="max-width:400px;margin:0 auto;font-size:1rem;">
        Tell us about your mission. We'll respond with a custom strategy within 24 hours.
      </p>
    </div>

    <!-- Contact card -->
    <div class="ag-card" style="padding:48px;">
      <div class="ag-accent-line" style="margin-bottom:36px;"></div>

      <form class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div style="grid-column:1/-1;">
          <label style="display:block;font-size:0.78rem;font-weight:600;color:#12102A;margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">Company Name</label>
          <input type="text" placeholder="Acme Corp">
        </div>

        <div>
          <label style="display:block;font-size:0.78rem;font-weight:600;color:#12102A;margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">First Name</label>
          <input type="text" placeholder="Jane">
        </div>
        <div>
          <label style="display:block;font-size:0.78rem;font-weight:600;color:#12102A;margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">Last Name</label>
          <input type="text" placeholder="Smith">
        </div>

        <div style="grid-column:1/-1;">
          <label style="display:block;font-size:0.78rem;font-weight:600;color:#12102A;margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">Email Address</label>
          <input type="email" placeholder="jane@company.com">
        </div>

        <div style="grid-column:1/-1;">
          <label style="display:block;font-size:0.78rem;font-weight:600;color:#12102A;margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">Services Needed</label>
          <select>
            <option value="">Select a service...</option>
            <option>Web Development</option>
            <option>SEO Optimization</option>
            <option>Digital Marketing</option>
            <option>Data Analytics</option>
            <option>Full-Stack Package</option>
          </select>
        </div>

        <div style="grid-column:1/-1;">
          <label style="display:block;font-size:0.78rem;font-weight:600;color:#12102A;margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">Project Details</label>
          <textarea rows="5" placeholder="Tell us about your project, goals, and timeline..."></textarea>
        </div>

        <div style="grid-column:1/-1;margin-top:8px;">
          <button type="button" class="btn-primary" style="width:100%;justify-content:center;">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            Submit Request
          </button>
        </div>

      </form>
    </div>
  </div>
</section>
