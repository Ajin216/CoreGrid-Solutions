<!-- Anti-Gravity Light — App Shell -->
<div style="background: #F5F4FF; min-height: 100vh; position: relative; overflow-x: hidden;">

  <!-- ── Global decorative background ───────────────────────────── -->
  <div style="position: fixed; inset: 0; z-index: 0; pointer-events: none;" aria-hidden="true">

    <!-- Hero radial glow -->
    <div style="
      position: absolute; top: -5%; left: 50%; transform: translateX(-50%);
      width: 1000px; height: 600px;
      background: radial-gradient(ellipse at 50% 0%, rgba(123,97,255,0.08), transparent 70%);
    "></div>

    <!-- Bottom-right teal glow -->
    <div style="
      position: absolute; bottom: 0; right: -5%;
      width: 700px; height: 500px;
      background: radial-gradient(ellipse at 80% 100%, rgba(0,196,167,0.06), transparent 70%);
    "></div>

    <!-- Animated lavender blob TL -->
    <div class="ag-blob" style="
      width: 480px; height: 480px; top: -80px; left: -120px;
      background: rgba(167,139,255,0.07);
      animation-duration: 22s;
    "></div>

    <!-- Animated teal blob BR -->
    <div class="ag-blob" style="
      width: 380px; height: 380px; bottom: -80px; right: -80px;
      background: rgba(0,196,167,0.06);
      animation-duration: 28s; animation-delay: 6s;
    "></div>

    <!-- Dot grid overlay -->
    <div class="ag-dot-grid"></div>
  </div>
  <!-- ──────────────────────────────────────────────────────────── -->

  <app-navbar></app-navbar>

  <main style="position: relative; z-index: 1;">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>
</div>
